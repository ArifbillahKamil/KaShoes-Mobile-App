name: kashoes_mobile
description: "KaShoes Customer Mobile App — Order shoes services on the go."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # Icons
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.5.1

  # HTTP Client
  dio: ^5.4.3+1

  # Local Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2

  # Navigation
  go_router: ^14.2.7

  # Maps & Location
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.1
  geocoding: ^3.0.0

  # Permissions
  permission_handler: ^11.3.1

  # Real-time / WebSocket
  web_socket_channel: ^3.0.1

  # UI Utilities
  shimmer: ^3.0.0
  google_fonts: ^6.2.1

  # Connectivity
  connectivity_plus: ^6.0.5

  # Date / Formatting
  intl: ^0.19.0

  # Notifications (for background location indicator)
  flutter_local_notifications: ^17.2.2

  # JSON / Data
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
